name: Keep HF Space alive

# Pings /health every 10 minutes so the free-tier HF Spaces container
# doesn't go to sleep between student sessions.
#
# The endpoint returns 200 {"status": "ok"} immediately — it doesn't
# trigger a cold-start reload, it just prevents the inactivity timer
# from resetting the container.
#
# To use:
#   1. Add your HF Space URL as a repo secret: HF_SPACE_URL
#      e.g. https://vibhuti16-dance-coach.hf.space
#   2. Push this file to .github/workflows/keep_alive.yml

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes, 24/7
  workflow_dispatch:           # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping health endpoint
        run: |
          SPACE_URL="${{ secrets.HF_SPACE_URL }}"

          # Fallback if secret not set (edit this to your actual URL)
          if [ -z "$SPACE_URL" ]; then
            SPACE_URL="https://vibhuti16-dance-coach.hf.space"
          fi

          echo "Pinging $SPACE_URL/health ..."

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "$SPACE_URL/health")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Space is alive (HTTP $HTTP_CODE)"
          else
            echo "⚠ Unexpected response: HTTP $HTTP_CODE"
            # Don't fail the workflow — a slow cold start may return non-200
            # briefly but the space will recover on its own
          fi